{% extends 'base.html' %}

{% block content %}
<div
    style="max-width:400px; margin:80px auto; background:#111; padding:40px; border-radius:10px; border:1px solid #333;">
    <h2 style="color:#c9a84c; margin-bottom:10px; text-align:center;">Reset Password</h2>

    <p style="color:#aaa; font-size:13px; text-align:center; margin-bottom:30px;">
        Enter your email address and we will send you a password reset link.
    </p>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:20px;">
            <label style="color:#aaa; font-size:13px; display:block; margin-bottom:6px;">Email</label>
            <input type="email" name="email" required placeholder="name@email.com"
                style="width:100%; padding:10px; background:#1a1a1a; border:1px solid #333; border-radius:6px; color:#fff; font-size:14px;">
        </div>

        <button type="submit" class="btn btn-gold" style="width:100%;">Send</button>
    </form>

    <p style="text-align:center; margin-top:20px; color:#aaa; font-size:13px;">
        <a href="/accounts/login/" style="color:#c9a84c;">Back to Login</a>
    </p>
</div>
{% endblock %}
