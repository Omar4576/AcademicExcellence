{% extends 'base.html' %}

{% block content %}
<div
    style="max-width:400px; margin:80px auto; background:#111; padding:40px; border-radius:10px; border:1px solid #333;">
    <h2 style="color:#c9a84c; margin-bottom:30px; text-align:center;">Giriş</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom:20px;">
            <label style="color:#aaa; font-size:13px; display:block; margin-bottom:6px;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color:#ff4444; font-size:12px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-gold" style="width:100%;">Daxil ol</button>
    </form>
    <p style="text-align:center; margin-top:20px; color:#aaa; font-size:13px;">
        Hesabınız yoxdur? <a href="/accounts/register/" style="color:#c9a84c;">Qeydiyyat</a>
    </p>
</div>
<style>
    input {
        width: 100%;
        padding: 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #c9a84c;
    }
</style>
{% endblock %}
