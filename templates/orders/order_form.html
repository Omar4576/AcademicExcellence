{% extends 'base.html' %}

{% block content %}
<div
    style="max-width:600px; margin:60px auto; background:#111; padding:40px; border-radius:10px; border:1px solid #333;">
    <h2 style="color:#c9a84c; margin-bottom:30px;">Yeni Sifariş</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom:20px;">
            <label style="color:#aaa; font-size:13px; display:block; margin-bottom:6px;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color:#ff4444; font-size:12px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button type="submit" class="btn btn-gold">Sifariş Ver</button>
            <a href="/dashboard/" class="btn btn-outline">Ləğv et</a>
        </div>
    </form>
</div>
<style>
    input,
    select,
    textarea {
        width: 100%;
        padding: 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        font-size: 14px;
    }

    input:focus,
    select:focus,
    textarea:focus {
        outline: none;
        border-color: #c9a84c;
    }

    select option {
        background: #1a1a1a;
    }
</style>
{% endblock %}
